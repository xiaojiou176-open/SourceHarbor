name: pre-commit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/../sourceharbor-project-venv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: ./.github/actions/setup-web-node
        with:
          node-version: "22"
          install-command: bash scripts/ci/prepare_web_runtime.sh
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - run: uv sync --frozen --extra dev --extra e2e
      - run: uvx pre-commit run --all-files
