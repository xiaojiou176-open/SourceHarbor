name: trivy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read # read repository contents for the filesystem scan

concurrency:
  group: trivy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-fs:
    name: trivy-fs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: true
          persist-credentials: false

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.65.0 \
            fs \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL \
            --exit-code 1 \
            --format table \
            --skip-dirs .git,.agents,.runtime-cache,apps/web/node_modules \
            .
