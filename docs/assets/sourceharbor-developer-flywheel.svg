<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SourceHarbor developer flywheel</title>
  <desc id="desc">A product flywheel showing sources flowing into job traces, knowledge cards, search and ask, MCP and API reuse, and operator feedback loops for Codex and Claude Code style workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="1136" y2="672" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#10294A"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="220" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173A6B"/>
      <stop offset="1" stop-color="#24528D"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="220" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F5B62"/>
      <stop offset="1" stop-color="#177C85"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="220" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6A3116"/>
      <stop offset="1" stop-color="#915128"/>
    </linearGradient>
    <filter id="shadow" x="-24" y="-24" width="260" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#02060D" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" stroke="#BCE3FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="1152" height="672" rx="32" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="624" rx="28" stroke="#6EB8FF" stroke-opacity="0.18"/>

  <text x="72" y="108" fill="#F5FAFF" font-size="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">
    SourceHarbor developer flywheel
  </text>
  <text x="72" y="146" fill="#B7CCE5" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif">
    Sources become job traces, knowledge cards, grounded search, and MCP-ready operator reuse.
  </text>

  <g transform="translate(96 232)" filter="url(#shadow)">
    <rect width="214" height="126" rx="24" fill="url(#cardA)"/>
    <text x="24" y="40" fill="#D9EEFF" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">1. Source intake</text>
    <text x="24" y="72" fill="#FFFFFF" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">YouTube</text>
    <text x="24" y="104" fill="#FFFFFF" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Bilibili · RSS</text>
  </g>

  <g transform="translate(356 152)" filter="url(#shadow)">
    <rect width="228" height="138" rx="24" fill="url(#cardB)"/>
    <text x="24" y="40" fill="#D7FEFF" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">2. Pipeline truth</text>
    <text x="24" y="76" fill="#FFFFFF" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Job trace</text>
    <text x="24" y="108" fill="#C5FAFF" font-size="19" font-family="Inter, Segoe UI, Arial, sans-serif">retries · degradations · artifacts</text>
  </g>

  <g transform="translate(366 366)" filter="url(#shadow)">
    <rect width="228" height="138" rx="24" fill="url(#cardA)"/>
    <text x="24" y="40" fill="#D9EEFF" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">3. Knowledge layer</text>
    <text x="24" y="76" fill="#FFFFFF" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Cards + bundle</text>
    <text x="24" y="108" fill="#D9EEFF" font-size="19" font-family="Inter, Segoe UI, Arial, sans-serif">long-lived evidence, not one-shot output</text>
  </g>

  <g transform="translate(662 160)" filter="url(#shadow)">
    <rect width="222" height="126" rx="24" fill="url(#cardC)"/>
    <text x="24" y="40" fill="#FFE3CC" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">4. Search front door</text>
    <text x="24" y="76" fill="#FFFFFF" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Search + Ask</text>
    <text x="24" y="106" fill="#FFE3CC" font-size="19" font-family="Inter, Segoe UI, Arial, sans-serif">citation-first, grounded-first</text>
  </g>

  <g transform="translate(662 372)" filter="url(#shadow)">
    <rect width="222" height="126" rx="24" fill="url(#cardB)"/>
    <text x="24" y="40" fill="#D7FEFF" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">5. Agent reuse</text>
    <text x="24" y="76" fill="#FFFFFF" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">MCP + HTTP API</text>
    <text x="24" y="106" fill="#D7FEFF" font-size="19" font-family="Inter, Segoe UI, Arial, sans-serif">Codex · Claude Code · builders</text>
  </g>

  <g transform="translate(942 248)" filter="url(#shadow)">
    <rect width="172" height="158" rx="24" fill="url(#cardA)"/>
    <text x="22" y="42" fill="#D9EEFF" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">6. Operator loop</text>
    <text x="22" y="82" fill="#FFFFFF" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Ops</text>
    <text x="22" y="114" fill="#FFFFFF" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Watchlists</text>
    <text x="22" y="144" fill="#D9EEFF" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif">trends · proof</text>
  </g>

  <path d="M310 295H348" stroke="#BCE3FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M488 290V340" stroke="#BCE3FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M594 224H654" stroke="#BCE3FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M594 430H654" stroke="#BCE3FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M884 224L936 264" stroke="#BCE3FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M884 430L936 392" stroke="#BCE3FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1030 406C1023 462 980 512 920 538C841 572 741 558 670 510" stroke="#68D1C7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="94" y="556" width="1012" height="76" rx="22" fill="#0B1A2D" fill-opacity="0.75" stroke="#6EB8FF" stroke-opacity="0.16"/>
  <text x="126" y="602" fill="#E9F5FF" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">
    Why developers stick around:
  </text>
  <text x="366" y="602" fill="#B7CCE5" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif">
    one control tower, shared truth across Web/API/MCP, and receipts instead of vibes.
  </text>
</svg>
