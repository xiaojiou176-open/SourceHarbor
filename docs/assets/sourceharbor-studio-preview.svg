  <rect x="86" y="72" width="246" height="34" rx="17" fill="#0B1220" stroke="#334155"/>
  <text x="108" y="94" fill="#E2E8F0" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">xiaojiou176 studio system</text>
  <text x="86" y="164" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800">SourceHarbor</text>
  <text x="86" y="212" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">Subscribe to source streams, generate readable digests,</text>
  <text x="86" y="246" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">and reuse artifacts through API and MCP.</text>
  <rect x="86" y="292" width="156" height="30" rx="15" fill="#111827" stroke="#1F2937"/>
