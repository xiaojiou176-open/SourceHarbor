  <text x="280" y="312" fill="#FCD34D" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">PRODUCE DIGESTS</text>
  <text x="464" y="312" fill="#BFDBFE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">SEARCH ARTIFACTS</text>
