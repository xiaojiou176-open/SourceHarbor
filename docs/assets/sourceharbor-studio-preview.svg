<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SourceHarbor preview</title>
  <desc id="desc">Preview card for SourceHarbor showing source intake, digest generation, and searchable artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="78" y1="30" x2="1194" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#134E4A"/>
    </linearGradient>
    <linearGradient id="orbA" x1="896" y1="42" x2="1188" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="orbB" x1="880" y1="148" x2="1152" y2="334" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="1232" height="372" rx="32" fill="url(#bg)"/>
